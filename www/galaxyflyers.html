<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Rocket - Sky Dodge</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: 'Audiowide', cursive, Arial, sans-serif;
    }

    canvas {
      display: block;
      touch-action: none;
    }

    #gameUI {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #scoreContainer {
      position: absolute;
      top: 20px;
      right: 0px;
      /* left ki jagah right */
      background: rgba(0, 0, 0, 0.7);
      padding: 5px 10px;
      border-radius: 10px;
      border: 2px solid #00fffc;

      z-index: 10;
      pointer-events: none;
    }

    .scoreText {
      color: #00fffc;

      margin: 5px 0;
      font-size: 18px;
    }

    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.95);
      padding: 30px;
      border-radius: 15px;
      border: 3px solid #ff0055;

      text-align: center;
      display: none;
      pointer-events: auto !important;
      /* FORCE pointer events */
      z-index: 9999 !important;
      /* FORCE high z-index */
      min-width: 300px;
    }

    #gameOver h1 {
      color: #ff0055;

      margin-top: 0;
      font-size: 32px;
    }

    #gameOver p {
      color: white;
      font-size: 18px;
      margin: 10px 0;
    }

    #gameOver button {
      background: linear-gradient(to bottom, #ff0055, #990033);
      border: none;
      color: white;
      padding: 12px 30px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Audiowide', cursive;
      margin: 10px 5px;

      transition: all 0.3s;
      border: 1px solid #ff88aa;
      min-width: 120px;
      pointer-events: auto !important;
      /* FORCE clickable */
      position: relative;
      z-index: 10000 !important;
    }

    #gameOver button:hover {
      transform: scale(1.05);

      background: linear-gradient(to bottom, #ff2266, #aa1155);
    }

    #gameOver button:active {
      transform: scale(0.95);
    }

    #controlsHint {
      position: absolute;
      bottom: 30px;
      width: 100%;
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
      font-size: 16px;
      text-shadow: 0 0 5px #000;
      z-index: 10;
      pointer-events: none;
    }

    #soundToggle {
      position: absolute;
      top: 120px;
      /* Score container ke neeche */
      right: 20px;
      z-index: 100;
      pointer-events: auto;
      background: #333;
      color: white;
      border: 2px solid #00fffc;
      padding: 12px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Audiowide', cursive;
      font-size: 16px;
      box-shadow: 0 0 15px rgba(0, 255, 252, 0.3);
      transition: all 0.3s;
    }

    #soundToggle:hover {
      background: #444;
      box-shadow: 0 0 20px rgba(0, 255, 252, 0.7);
      transform: scale(1.05);
    }

    #soundToggle:active {
      transform: scale(0.95);
    }

    /* Game Over ke andar wala button */
    #gameOver button.sound-btn {
      background: #121212;
      color: white;
      border: 2px solid #00fffc;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Audiowide', cursive;
      width: 80%;
      font-size: 16px;
      margin: 10px auto;
      display: block;
      transition: all 0.3s;
    }

    #gameOver button.sound-btn:hover {
      background: #1a1a1a;
      box-shadow: 0 0 20px #00fffc;
      transform: scale(1.02);
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
        text-shadow: 0 0 10px currentColor;
      }

      50% {
        transform: scale(1.05);
        opacity: 0.8;
        text-shadow: 0 0 20px currentColor;
      }

      100% {
        transform: scale(1);
        opacity: 1;
        text-shadow: 0 0 10px currentColor;
      }
    }

    #leaderboardList::-webkit-scrollbar {
      width: 5px;
    }

    #leaderboardList::-webkit-scrollbar-track {
      background: #111;
      border-radius: 5px;
    }

    #leaderboardList::-webkit-scrollbar-thumb {
      background: #00fffc;
      border-radius: 5px;
    }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDM9zOfVMfqFFaODd7OZ-N2qC4ZuZhe10o",
      authDomain: "fauxfireotp.firebaseapp.com",
      databaseURL: "https://fauxfireotp-default-rtdb.firebaseio.com",
      projectId: "fauxfireotp",
      storageBucket: "fauxfireotp.firebasestorage.app",
      messagingSenderId: "254203897427",
      appId: "1:254203897427:web:a786eb9cf8d7c3514208a6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.db = db;
    window.auth = auth;
    window.getDoc = getDoc;
    window.setDoc = setDoc;
    window.doc = doc;
    window.collection = collection;
    window.query = query;
    window.orderBy = orderBy;
    window.limit = limit;
    window.getDocs = getDocs;
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
</head>

<body>
  <canvas id="gameCanvas"></canvas>

  <div id="gameUI">
    <div id="scoreContainer">
      <div class="scoreText">SCORE: <span id="scoreDisplay">0</span></div>
      <div class="scoreText">HIGH SCORE: <span id="highScoreDisplay">0</span></div>
      <div class="scoreText">COINS: <span id="coinsDisplay">0</span></div>
    </div>


    <div id="gameOver">
      <h1>GAME OVER</h1>
      <p>Your Score: <span id="finalScore" style="color: #00fffc;">0</span></p>
      <p>High Score: <span id="finalHighScore" style="color: #00fffc;">0</span></p>

      <div id="rankMessage"
        style="font-size: 20px; font-weight: bold; margin-top: 10px; display: none; text-shadow: 0 0 10px currentColor; text-transform: uppercase;">
      </div>

      <div id="leaderboardContainer"
        style="margin-top: 15px; border-top: 2px solid #333; padding-top: 10px; display: none; max-width: 100%;">
        <h3 style="color: #00fffc; margin: 0 0 10px 0; font-family: 'Audiowide', cursive; font-size: 16px;">TOP 5 PILOTS
        </h3>
        <ul id="leaderboardList"
          style="list-style: none; padding: 0; margin: 0; max-height: 120px; overflow-y: auto; text-align: left; color: white; font-size: 14px;">
          <!-- Leaderboard items -->
        </ul>
      </div>

      <!-- Sound Toggle Button - Game Over ke andar -->
      <div style="margin: 15px 0; padding: 5px; border-top: 1px solid #333; border-bottom: 1px solid #333;">
        <button id="gameOverSoundToggle"
          style="background:#121212; color:white; border:2px solid #00fffc; padding:8px 20px; border-radius:8px; cursor:pointer; font-family:'Audiowide', cursive; width:80%; font-size:16px; margin:5px auto;">🔇
          Sound Off</button>
      </div>

      <div>
        <button id="retryButton">RETRY</button>
        <button id="homeButton">BACK</button>
      </div>
    </div>

    <!-- Start Screen -->
    <div id="startScreen"
      style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); padding: 30px; border-radius: 15px; border: 3px solid #00fffc; text-align: center; z-index: 10000; min-width: 320px; box-shadow: 0 0 20px #00fffc; pointer-events: auto;">
      <h1 style="color: #00fffc; margin-top: 0; font-size: 32px; text-shadow: 0 0 10px #00fffc;">GALAXY FLYERS</h1>

      <div id="startLeaderboardContainer"
        style="margin-top: 15px; border-top: 2px solid #333; padding-top: 10px; padding-bottom: 10px; border-bottom: 2px solid #333;">
        <h3 style="color: #00fffc; margin: 0 0 10px 0; font-family: 'Audiowide', cursive; font-size: 16px;">TOP 3 PILOTS
        </h3>
        <ul id="startLeaderboardList"
          style="list-style: none; padding: 0; margin: 0; text-align: left; color: white; font-size: 14px;">
          <li style="text-align:center; color:#ccc;">⏳ Loading Leaderboard...</li>
        </ul>
      </div>

      <div style="margin: 15px 0; padding: 5px;">
        <button id="startSoundToggle"
          style="background:#121212; color:white; border:2px solid #00fffc; padding:8px 20px; border-radius:8px; cursor:pointer; font-family:'Audiowide', cursive; width:80%; font-size:16px; margin:5px auto; transition: all 0.3s;">🔇
          Sound Off</button>
      </div>

      <div>
        <button id="playButton"
          style="background: linear-gradient(to bottom, #00fffc, #009999); border: none; color: black; padding: 15px 40px; font-size: 22px; font-weight: bold; border-radius: 8px; cursor: pointer; font-family: 'Audiowide', cursive; margin: 10px 5px; transition: all 0.3s; box-shadow: 0 0 15px #00fffc;">PLAY
          NOW</button>
        <br>
        <button id="startHomeButton"
          style="background: linear-gradient(to bottom, #444, #222); border: 1px solid #777; color: white; padding: 10px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; font-family: 'Audiowide', cursive; margin: 5px; transition: all 0.3s;">MAIN
          MENU</button>
      </div>
    </div>

    <div id="controlsHint" style="display: none;">TAP to FLY</div>
  </div>


  <script>
    const bgMusic = new Audio();
    bgMusic.loop = true;
    bgMusic.src = 'spacejam.mp3';

    const gameOverSound = new Audio();
    gameOverSound.src = 'gameover.mp3';

    let soundOn = true; // 1. Start as ON

    function toggleSound() {
      if (soundOn) {
        bgMusic.pause();
        updateSoundButtons('🔇 Sound Off');
      } else {
        bgMusic.play().catch(e => console.log('Error:', e));
        updateSoundButtons('🔊 Sound On');
      }
      soundOn = !soundOn;
    }

    function updateSoundButtons(text) {
      const buttons = document.querySelectorAll('#soundToggle, #gameOverSoundToggle, #startSoundToggle');
      buttons.forEach(btn => {
        if (btn) btn.innerHTML = text;
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      updateSoundButtons('🔊 Sound On'); // 2. Set default UI

      const mainSoundBtn = document.getElementById('soundToggle');
      const gameOverSoundBtn = document.getElementById('gameOverSoundToggle');
      const startSoundBtn = document.getElementById('startSoundToggle');

      if (mainSoundBtn) mainSoundBtn.onclick = (e) => { e.stopPropagation(); toggleSound(); };
      if (gameOverSoundBtn) gameOverSoundBtn.onclick = (e) => { e.stopPropagation(); toggleSound(); };
      if (startSoundBtn) startSoundBtn.onclick = (e) => { e.stopPropagation(); toggleSound(); };
    });

    // 3. Pehle click par music trigger
    window.addEventListener('click', function initSound() {
      if (soundOn) {
        bgMusic.play().catch(() => { });
      }
    }, { once: true });

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // UI Elements
    const scoreDisplay = document.getElementById("scoreDisplay");
    const highScoreDisplay = document.getElementById("highScoreDisplay");
    const coinsDisplay = document.getElementById("coinsDisplay");
    const finalScore = document.getElementById("finalScore");
    const finalHighScore = document.getElementById("finalHighScore");
    const gameOverScreen = document.getElementById("gameOver");
    const startScreen = document.getElementById("startScreen");
    const controlsHint = document.getElementById("controlsHint");
    const retryButton = document.getElementById("retryButton");
    const homeButton = document.getElementById("homeButton");
    const playButton = document.getElementById("playButton");
    const startHomeButton = document.getElementById("startHomeButton");

    let isGameStarted = false;

    // ROCKET Player
    const player = {
      x: 20,
      y: 200,
      width: 60,
      height: 30,
      velocity: 0,
      gravity: 0.28,
      lift: -6,
      isBoosting: false
    };

    // Particles
    const flames = [];

    const obstacles = [];
    const coins = [];
    let score = 0;
    let gameSpeed = 5;
    let highScore = localStorage.getItem("highScore") || 0;
    let totalCoins = localStorage.getItem("totalCoins") || 0;
    let gameOver = false;
    let backgroundX = 0;

    // Original background gradient
    const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bgGradient.addColorStop(0, "#000428");
    bgGradient.addColorStop(1, "#004e92");

    // Update UI displays
    function updateUI() {
      scoreDisplay.textContent = score;
      highScoreDisplay.textContent = highScore;
      coinsDisplay.textContent = totalCoins;
    }

    updateUI();

    function createFlame() {
      flames.push({
        x: player.x - 5,
        y: player.y + player.height / 2 + (Math.random() * 8 - 4),
        size: Math.random() * 8 + 4,
        life: 1.0,
        decay: 0.02,
        vx: -Math.random() * 2 - 1,
        vy: (Math.random() - 0.5) * 0.5
      });
    }

    function drawBackground() {
      ctx.fillStyle = bgGradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "white";
      for (let i = 0; i < 100; i++) {
        const x = (backgroundX + i * 50) % canvas.width;
        const y = (i * 37) % canvas.height;
        const size = Math.random() * 2 + 1;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
      for (let i = 0; i < 50; i++) {
        const x = (backgroundX * 2 + i * 100) % canvas.width;
        const y = (i * 74) % canvas.height;
        const size = Math.random() * 1 + 0.5;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }

      backgroundX -= 1;
    }

    function drawRocket() {
      ctx.save();

      // Flame
      if (player.isBoosting) {
        ctx.save();

        const flameGradient = ctx.createLinearGradient(
          player.x - 5, player.y + player.height / 2,
          player.x - 25, player.y + player.height / 2
        );
        flameGradient.addColorStop(0, "red");
        flameGradient.addColorStop(0.5, "orange");
        flameGradient.addColorStop(1, "yellow");

        ctx.shadowColor = "orange";
        ctx.shadowBlur = 20;

        ctx.beginPath();
        ctx.moveTo(player.x - 5, player.y + player.height / 2 - 8);
        ctx.lineTo(player.x - 25, player.y + player.height / 2);
        ctx.lineTo(player.x - 5, player.y + player.height / 2 + 8);
        ctx.closePath();
        ctx.fillStyle = flameGradient;
        ctx.fill();

        ctx.restore();

        if (Math.random() < 0.3) {
          createFlame();
        }
      } else {
        ctx.save();
        ctx.shadowColor = "orange";
        ctx.shadowBlur = 10;

        ctx.beginPath();
        ctx.moveTo(player.x - 5, player.y + player.height / 2 - 5);
        ctx.lineTo(player.x - 15, player.y + player.height / 2);
        ctx.lineTo(player.x - 5, player.y + player.height / 2 + 5);
        ctx.closePath();

        ctx.fillStyle = "orange";
        ctx.fill();

        ctx.restore();
      }

      // Flame particles
      for (let i = flames.length - 1; i >= 0; i--) {
        const flame = flames[i];

        ctx.save();
        ctx.globalAlpha = flame.life;
        ctx.fillStyle = `hsl(${20 + (1 - flame.life) * 30}, 100%, 60%)`;
        ctx.shadowColor = "red";
        ctx.shadowBlur = 8;

        flame.x += flame.vx;
        flame.y += flame.vy;
        flame.life -= flame.decay;

        const radius = Math.max(0, flame.size * flame.life);
        ctx.beginPath();
        ctx.arc(flame.x, flame.y, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        if (flame.life <= 0) {
          flames.splice(i, 1);
        }
      }

      // Rocket body
      ctx.save();
      // Deep metallic titanium effect
      ctx.shadowColor = "rgba(0,0,0,0.7)";
      ctx.shadowBlur = 30;

      const rocketGradient = ctx.createLinearGradient(
        player.x,
        player.y,
        player.x,
        player.y + player.height
      );

      // Dark metallic shading
      rocketGradient.addColorStop(0, "#6e6e6e");
      rocketGradient.addColorStop(0.25, "#4f4f4f");
      rocketGradient.addColorStop(0.5, "#3a3a3a");
      rocketGradient.addColorStop(0.75, "#2a2a2a");
      rocketGradient.addColorStop(1, "#1c1c1c");

      ctx.fillStyle = rocketGradient;
      ctx.fillRect(player.x, player.y, player.width - 5, player.height);

      // Subtle metallic shine strip
      ctx.fillStyle = "rgba(255,255,255,0.18)";
      ctx.fillRect(player.x + 10, player.y + 4, 5, player.height - 8);

      // Nose cone
      ctx.fillStyle = "#b30000";
      ctx.beginPath();
      ctx.moveTo(player.x + player.width - 5, player.y);
      ctx.lineTo(player.x + player.width + 8, player.y + player.height / 2);
      ctx.lineTo(player.x + player.width - 5, player.y + player.height);
      ctx.closePath();
      ctx.fill();

      // Fins
      ctx.fillStyle = "#222222";

      ctx.beginPath();
      ctx.moveTo(player.x + 5, player.y);
      ctx.lineTo(player.x - 5, player.y - 8);
      ctx.lineTo(player.x + 5, player.y + 5);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(player.x + 5, player.y + player.height);
      ctx.lineTo(player.x - 5, player.y + player.height + 8);
      ctx.lineTo(player.x + 5, player.y + player.height - 5);
      ctx.closePath();
      ctx.fill();

      // Windows
      ctx.fillStyle = "#00c3ff";

      const frontWindowRadius = Math.max(2, 4);
      ctx.beginPath();
      ctx.arc(player.x + player.width - 15, player.y + player.height / 2 - 4, frontWindowRadius, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowColor = "#00c3ff";
      const middleWindowRadius = Math.max(2, 3);
      ctx.beginPath();
      ctx.arc(player.x + player.width - 30, player.y + player.height / 2, middleWindowRadius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#66ccff";
      const backWindowRadius = Math.max(1, 2);
      ctx.beginPath();
      ctx.arc(player.x + player.width - 45, player.y + player.height / 2 + 2, backWindowRadius, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      ctx.restore();
    }

    function drawObstacles() {
      obstacles.forEach(obs => {
        ctx.save();
        ctx.shadowColor = "#ff6600";
        ctx.shadowBlur = 15;

        ctx.fillStyle = "#ff9933";
        ctx.beginPath();
        ctx.arc(obs.x + obs.width / 2, obs.y + obs.height / 2, obs.width / 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#cc6600";
        ctx.beginPath();
        ctx.arc(obs.x + obs.width / 3, obs.y + obs.height / 3, obs.width / 6, 0, Math.PI * 2);
        ctx.arc(obs.x + obs.width / 1.5, obs.y + obs.height / 1.5, obs.width / 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 153, 51, 0.5)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(obs.x + obs.width / 2, obs.y + obs.height / 2, obs.width / 2 + 5, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();

        obs.x -= gameSpeed;
      });
    }

    function drawCoins() {
      coins.forEach((coin, index) => {
        ctx.save();
        ctx.shadowColor = "#ffcc00";
        ctx.shadowBlur = 15;

        ctx.fillStyle = "#ffcc00";
        ctx.beginPath();
        ctx.arc(coin.x + coin.width / 2, coin.y + coin.height / 2, coin.width / 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#ff9900";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(coin.x + coin.width / 2, coin.y + coin.height / 2, coin.width / 3, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = "#ff9900";
        ctx.font = "bold " + (coin.width / 2) + "px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("$", coin.x + coin.width / 2, coin.y + coin.height / 2);

        ctx.restore();

        coin.x -= gameSpeed;

        if (
          player.x < coin.x + coin.width &&
          player.x + player.width > coin.x &&
          player.y < coin.y + coin.height &&
          player.y + player.height > coin.y
        ) {
          coins.splice(index, 1);
          score += 10;
          totalCoins = parseInt(totalCoins) + 1;
          localStorage.setItem("totalCoins", totalCoins);
          updateUI();
        }
      });
    }

    function updatePlayer() {
      player.velocity += player.gravity;
      player.y += player.velocity;

      player.isBoosting = false;

      if (player.y + player.height > canvas.height) {
        player.y = canvas.height - player.height;
        player.velocity = 0;
        endGame();
      }

      if (player.y < 0) {
        player.y = 0;
        player.velocity = 0;
        endGame();
      }
    }

    function checkCollision() {

      obstacles.forEach(obs => {
        if (
          player.x < obs.x + obs.width &&
          player.x + player.width > obs.x &&
          player.y < obs.y + obs.height &&
          player.y + player.height > obs.y
        ) {
          endGame();
        }
      });
    }

    async function endGame() {
      if (gameOver) return;

      if (soundOn) gameOverSound.play().catch(e => console.log(e));

      gameOver = true;
      player.isBoosting = false;

      if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
      }

      finalScore.textContent = score;
      finalHighScore.textContent = highScore;

      const rm = document.getElementById("rankMessage");
      const lc = document.getElementById("leaderboardContainer");
      const ll = document.getElementById("leaderboardList");

      if (rm) rm.style.display = "none";
      if (lc) lc.style.display = "none";
      if (ll) ll.innerHTML = '<li style="text-align:center; color:#ccc;">⏳ Loading Leaderboard...</li>';

      gameOverScreen.style.display = "block";

      if (window.auth && window.auth.currentUser) {
        const user = window.auth.currentUser;
        const userRef = window.doc(window.db, "rocketLeaderboard", user.uid);

        let finalBestScore = score;

        try {
          const docSnap = await window.getDoc(userRef);
          if (docSnap.exists() && docSnap.data().bestScore > score) {
            finalBestScore = docSnap.data().bestScore;
          }

          // Save best score
          if (score > 0 || !docSnap.exists()) {
            await window.setDoc(userRef, {
              username: user.displayName || user.email?.split('@')[0] || "Player",
              bestScore: finalBestScore,
              updatedAt: new Date()
            }, { merge: true });
          }

          // Fetch leaderboard (top 3)
          const q = window.query(window.collection(window.db, "rocketLeaderboard"), window.orderBy("bestScore", "desc"), window.limit(3));
          const querySnapshot = await window.getDocs(q);

          let html = "";
          let rank = 1;
          let userRank = null;
          let userInTop3 = false;

          querySnapshot.forEach((docSnap) => {
            const data = docSnap.data();
            html += `<li style="padding: 5px; border-bottom: 1px solid #444; display: flex; justify-content: space-between;">
              <span>#${rank} ${data.username}</span>
              <span style="color: #00fffc;">${data.bestScore}</span>
            </li>`;
            if (docSnap.id === user.uid) {
              userRank = rank;
              userInTop3 = true;
            }
            rank++;
          });

          // Add user score at the bottom if not in top 3
          if (!userInTop3) {
            html += `<li style="padding: 5px; border-top: 2px dashed #00fffc; margin-top: 5px; display: flex; justify-content: space-between; font-weight: bold; color: #00fffc;">
              <span>You</span>
              <span>${finalBestScore}</span>
            </li>`;
          }

          if (ll) {
            ll.innerHTML = html || "<li style='text-align:center;'>No scores yet!</li>";
          }
          if (lc) lc.style.display = "block";

          // Display congrats message if rank 1, 2, or 3
          if (userInTop3 && userRank <= 3 && score > 0 && rm) {
            const msgs = ["", "🏆 CONGRATS! YOU ARE #1", "🥈 IMPRESSIVE! YOU ARE #2", "🥉 GREAT JOB! YOU ARE #3"];
            rm.textContent = msgs[userRank];

            if (userRank === 1) rm.style.color = "#FFD700";
            if (userRank === 2) rm.style.color = "#C0C0C0";
            if (userRank === 3) rm.style.color = "#CD7F32";

            rm.style.display = "block";
            rm.style.animation = "pulse 1.5s infinite";
          }

        } catch (e) {
          console.error("Error with leaderboard:", e);
          if (ll) ll.innerHTML = "<li style='text-align:center; color:#ff4444;'>Error loading leaderboard</li>";
          if (lc) lc.style.display = "block";
        }
      } else {
        if (ll) ll.innerHTML = "<li style='text-align:center; color:#ffcc00;'>Sign in to save scores!</li>";
        if (lc) lc.style.display = "block";
      }
    }

    function resetGame() {
      console.log("Reset game called"); // Debug
      player.y = 200;
      player.velocity = 0;
      player.isBoosting = false;
      obstacles.length = 0;
      coins.length = 0;
      flames.length = 0;
      score = 0;
      gameSpeed = 5;

      if (!isGameStarted) return; // Prevent interval logic if not really started

      if (window.speedInterval) clearInterval(window.speedInterval);
      window.speedInterval = setInterval(() => {
        if (!gameOver) {
          gameSpeed += 0.5;
        }
      }, 10000);

      if (window.scoreInterval) clearInterval(window.scoreInterval);
      window.scoreInterval = setInterval(() => {
        if (!gameOver) {
          score += 1;
          updateUI();
        }
      }, 500);

      if (window.obstacleTimer) clearTimeout(window.obstacleTimer);
      function scheduleObstacle() {
        if (!gameOver) spawnObstacle();
        const delay = Math.max(500, 1500 - (gameSpeed - 5) * 150);
        window.obstacleTimer = setTimeout(scheduleObstacle, delay);
      }
      scheduleObstacle();

      if (window.coinTimer) clearTimeout(window.coinTimer);
      function scheduleCoin() {
        if (!gameOver) spawnCoin();
        const delay = Math.max(800, 2000 - (gameSpeed - 5) * 100);
        window.coinTimer = setTimeout(scheduleCoin, delay);
      }
      scheduleCoin();

      gameOver = false;
      gameOverScreen.style.display = "none";
      updateUI();
    }

    function goHome() {
      console.log("Go home called"); // Debug
      window.location.href = 'games.html';
    }

    function gameLoop() {
      if (!isGameStarted) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        drawRocket();
        requestAnimationFrame(gameLoop);
        return;
      }

      if (!gameOver) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        drawObstacles();
        drawCoins();
        drawRocket();
        updatePlayer();
        checkCollision();

        for (let i = obstacles.length - 1; i >= 0; i--) {
          if (obstacles[i].x + obstacles[i].width < 0) {
            obstacles.splice(i, 1);
          }
        }

        for (let i = coins.length - 1; i >= 0; i--) {
          if (coins[i].x + coins[i].width < 0) {
            coins.splice(i, 1);
          }
        }
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        drawObstacles();
        drawCoins();
        drawRocket();
      }

      requestAnimationFrame(gameLoop);
    }

    function spawnObstacle() {
      if (gameOver) return;

      const height = Math.random() * 100 + 50;
      obstacles.push({
        x: canvas.width,
        y: Math.random() * (canvas.height - height),
        width: 50,
        height
      });
    }

    function spawnCoin() {
      if (gameOver) return;
      if (Math.random() < 0.7) return;

      coins.push({
        x: canvas.width,
        y: Math.random() * (canvas.height - 40),
        width: 40,
        height: 40
      });
    }

    // EVENT LISTENERS
    window.addEventListener("touchstart", (e) => {
      if (!isGameStarted || gameOver) return;
      if (e.target.tagName === "BUTTON") return;
      e.preventDefault();

      player.velocity = player.lift;
      player.isBoosting = true;
      createFlame();
    }, { passive: false });

    window.addEventListener("touchend", (e) => {
      if (!isGameStarted || gameOver) return;
      if (e.target.tagName === "BUTTON") return;
      e.preventDefault();
      player.isBoosting = false;
    }, { passive: false });

    window.addEventListener("mousedown", (e) => {
      if (!isGameStarted || gameOver) return;
      if (e.target.tagName === "BUTTON") return;
      player.velocity = player.lift;
      player.isBoosting = true;
      createFlame();
    });

    window.addEventListener("mouseup", (e) => {
      if (!isGameStarted || gameOver) return;
      if (e.target.tagName === "BUTTON") return;
      player.isBoosting = false;
    });

    // START SCREEN LOGIC
    async function loadStartLeaderboard() {
      const sll = document.getElementById("startLeaderboardList");
      if (!sll) return;

      if (!window.auth || !window.auth.currentUser) {
        setTimeout(loadStartLeaderboard, 1000); // Retry if auth not ready
        return;
      }

      const user = window.auth.currentUser;

      try {
        const userRef = window.doc(window.db, "rocketLeaderboard", user.uid);
        const docSnap = await window.getDoc(userRef);
        let finalBestScore = docSnap.exists() ? docSnap.data().bestScore : 0;

        const q = window.query(window.collection(window.db, "rocketLeaderboard"), window.orderBy("bestScore", "desc"), window.limit(3));
        const querySnapshot = await window.getDocs(q);

        let html = "";
        let rank = 1;
        let userInTop3 = false;

        querySnapshot.forEach((docSnap) => {
          const data = docSnap.data();
          html += `<li style="padding: 5px; border-bottom: 1px solid #444; display: flex; justify-content: space-between;">
            <span>#${rank} ${data.username}</span>
            <span style="color: #00fffc;">${data.bestScore}</span>
          </li>`;
          if (docSnap.id === user.uid) userInTop3 = true;
          rank++;
        });

        if (!userInTop3 && finalBestScore > 0) {
          html += `<li style="padding: 5px; border-top: 2px dashed #00fffc; margin-top: 5px; display: flex; justify-content: space-between; font-weight: bold; color: #00fffc;">
            <span>You</span>
            <span>${finalBestScore}</span>
          </li>`;
        }

        sll.innerHTML = html || "<li style='text-align:center;'>No scores yet!</li>";
      } catch (e) {
        console.log("Start LB error:", e);
      }
    }

    playButton.onclick = function (e) {
      e.preventDefault();
      e.stopPropagation();
      startScreen.style.display = "none";
      controlsHint.style.display = "block";
      isGameStarted = true;
      if (soundOn) bgMusic.play().catch(() => { });
      resetGame();
    };

    startHomeButton.onclick = function (e) {
      e.preventDefault();
      e.stopPropagation();
      window.location.href = 'games.html';
    };

    // SIMPLE BUTTON HANDLERS - Direct assignment
    retryButton.onclick = function (e) {
      e.preventDefault();
      e.stopPropagation();
      console.log("Retry clicked");
      resetGame();
      return false;
    };

    homeButton.onclick = function (e) {
      e.preventDefault();
      e.stopPropagation();
      console.log("Home clicked");
      window.location.href = 'games.html';
      return false;
    };

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Start game Loop (but wait for play button)
    loadStartLeaderboard();
    resetGame();
    gameLoop();
  </script>
  <script src="backbutton.js"></script>
</body>

</html>
