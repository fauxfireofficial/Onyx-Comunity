<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games - Onyx Gaming</title>
  <!-- Bootstrap + Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    /* Simple Games Grid Styles */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      margin-top: 30px;
    }

    .game-card-link {
      text-decoration: none;
      color: inherit;
      display: block;
      height: 100%;
    }

    .game-card-link:hover {
      text-decoration: none;
    }

    .game-card {
      cursor: pointer;
      transition: var(--transition);
      height: 100%;
    }

    .game-card:hover {
      transform: translateY(-5px);
    }

    .game-card .card-img-top {

      height: 200px;
      object-fit: cover;
      border-bottom: 3px solid var(--gold);
      border-radius: 12px 12px 0px 0px;
    }

    .play-btn-small {
      background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
      border: none;
      border-bottom: 3px solid #8b6910;
      color: var(--wood-brown);
      font-weight: 700;
      padding: 8px 20px;
      border-radius: 25px;
      font-size: 0.9rem;
      font-family: 'Luckiest Guy', cursive;
      letter-spacing: 0.5px;
      transition: var(--transition);
      cursor: pointer;
      text-transform: uppercase;
      display: inline-block;
      text-decoration: none;
      width: 100%;
      text-align: center;
    }

    .play-btn-small:hover {
      transform: translateY(-2px);
      border-bottom-width: 4px;
      filter: brightness(1.1);
      color: var(--wood-brown);
    }

    .game-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
      font-size: 0.9rem;
    }

    .game-category {
      background: var(--parchment);
      border: 1px solid var(--gold);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      color: var(--wood-brown);
    }

    .game-rating {
      color: var(--gold);
      font-weight: 700;
    }

    .game-rating i {
      margin-right: 3px;
    }

    .page-wrap {
      padding-bottom: 80px !important;
    }
  </style>
</head>

<body>
  <!-- Navbar (Same as index.html) -->
  <nav class="main-nav navbar navbar-expand-lg">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="brand navbar-brand d-flex align-items-center" href="index.html">
        <i class="fas fa-gem me-2"></i>
        onyx
      </a>
      <div class="d-flex align-items-center gap-3">
        <button class="btn text-white fs-4" id="sidebarToggle" style="border: none; background: none;">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Sidebar (Same as index.html) -->
  <div id="mySidebar" class="sidebar">
    <div class="sidebar-header">
      <button class="close-btn" id="closeSidebar">&times;</button>
      <div class="user-info-side mt-5 text-center" id="sideUserInfo" style="display: none;">
        <img src="" alt="Profile" class="mx-auto mb-2" id="sideProfileImg"
          style="width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #ffcc00; display:none;">
        <i class="fas fa-user-circle fa-4x text-white mb-2" id="sideProfileFallback"></i>
        <h5 class="text-white" id="sideUserName">Gamer</h5>
      </div>
      <div class="text-center mt-5" id="sideAuthBtn" style="display: none;">
        <button class="btn btn-warning" onclick="window.location.href='login.html'">SIGN IN</button>
      </div>
    </div>
    <hr class="text-secondary mx-3">
    <div class="sidebar-links">
      <a href="index.html"><i class="fas fa-home me-3"></i> Home</a>
      <a href="profile.html" id="sideProfileLink"><i class="fas fa-user me-3"></i> My Profile</a>
      <a href="contact.html" class="active"><i class="fas fa-envelope me-3"></i> Contact Us</a>
      <a href="#" id="sideLogout" style="color: #ff4444;"><i class="fas fa-sign-out-alt me-3"></i> Logout</a>
    </div>
  </div>
  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <!-- Main Content -->
  <div class="page-wrap container py-4">
    <!-- Page Header -->
    <header class="page-header mb-4">
      <div class="search-filter-wrapper">
        <div class="search-section">
          <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input class="form-control" id="search" placeholder="Search posts..." aria-label="Search posts" />
            <!-- Input baad mein -->
          </div>
        </div>
        <div class="filter-section">
          <ul class="filter-list" id="gameFilters" role="tablist">
            <li role="presentation"><button class="filter-btn active" data-category="all" role="tab">All Games</button>
            </li>
            <!-- <li role="presentation"><button class="filter-btn" data-category="action" role="tab">Action</button></li> -->
            <!-- <li role="presentation"><button class="filter-btn" data-category="adventure" role="tab">Adventure</button></li> -->
            <li role="presentation"><button class="filter-btn" data-category="strategy" role="tab">Strategy</button>
            </li>
            <!-- <li role="presentation"><button class="filter-btn" data-category="racing" role="tab">Racing</button></li> -->
          </ul>
        </div>
      </div>
    </header>

    <!-- Games Grid -->
    <div class="games-grid" id="gamesGrid">
      <!-- Game Card 1 - GTA V -->
      <a href="galaxyflyers.html" class="game-card-link">
        <div class="card card-dark game-card">
          <img src="spcaeglide.png" class="card-img-top" alt="GTA V">
          <div class="card-body">
            <h5 class="mb-2">Space Glide</h5>
            <div class="game-meta">
              <span class="game-category">Strategy</span>
              <span class="game-rating"><i class="fa-solid fa-star text-warning"></i> 3.8</span>
            </div>
            <p class="text-muted small mb-3">20+ players • Endless Flyer</p>
            <span class="play-btn-small">PLAY NOW</span>
          </div>
        </div>
      </a>



      <!-- Bootstrap JS -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

      <script>
        // Sidebar functionality
        document.addEventListener('DOMContentLoaded', function () {
          const sidebar = document.getElementById('mySidebar');
          const overlay = document.getElementById('sidebarOverlay');
          const toggleBtn = document.getElementById('sidebarToggle');
          const closeBtn = document.getElementById('closeSidebar');
          const sideLogout = document.getElementById('sideLogout');

          // Debug: Check if elements are found
          console.log('Toggle button found:', toggleBtn);
          console.log('Sidebar found:', sidebar);
          console.log('Overlay found:', overlay);

          // Open Sidebar
          if (toggleBtn) {
            toggleBtn.addEventListener('click', function (e) {
              e.preventDefault();
              console.log('Toggle button clicked'); // Debug
              sidebar.style.width = "280px";
              overlay.style.display = "block";
            });
          } else {
            console.error('Toggle button not found!');
          }

          // Close Sidebar function
          function closeNav() {
            console.log('Closing sidebar'); // Debug
            sidebar.style.width = "0";
            overlay.style.display = "none";
          }

          if (closeBtn) {
            closeBtn.addEventListener('click', closeNav);
          }

          if (overlay) {
            overlay.addEventListener('click', closeNav);
          }

          // Sidebar Auth Check
          const currentUser = localStorage.getItem('currentUser');
          if (currentUser) {
            const userData = JSON.parse(currentUser);
            document.getElementById('sideUserInfo').style.display = 'block';
            document.getElementById('sideUserName').textContent = userData.name || 'Gamer';

            if (userData.avatar) {
              const sideImg = document.getElementById('sideProfileImg');
              sideImg.src = userData.avatar;
              sideImg.style.display = 'block';
              document.getElementById('sideProfileFallback').style.display = 'none';
            }
          } else {
            document.getElementById('sideAuthBtn').style.display = 'block';
            document.getElementById('sideProfileLink').style.display = 'none';
            if (sideLogout) sideLogout.style.display = 'none';
          }

          // Logout Function
          if (sideLogout) {
            sideLogout.addEventListener('click', (e) => {
              e.preventDefault();
              localStorage.removeItem('currentUser');
              location.reload();
            });
          }

          // Search functionality
          const searchInput = document.getElementById('search');

          if (searchInput) {
            searchInput.addEventListener('input', function (e) {
              const query = e.target.value.toLowerCase().trim();
              const cards = document.querySelectorAll('.game-card-link');

              cards.forEach(card => {
                if (query === '') {
                  card.style.display = '';
                } else {
                  const gameName = card.querySelector('h5').textContent.toLowerCase();
                  if (gameName.includes(query)) {
                    card.style.display = '';
                  } else {
                    card.style.display = 'none';
                  }
                }
              });
            });
          }

          // Filter functionality
          const filterBtns = document.querySelectorAll('#gameFilters .filter-btn');
          filterBtns.forEach(btn => {
            btn.addEventListener('click', function () {
              filterBtns.forEach(b => b.classList.remove('active'));
              this.classList.add('active');

              const category = this.dataset.category;
              const cards = document.querySelectorAll('.game-card-link');

              cards.forEach(card => {
                if (category === 'all') {
                  card.style.display = '';
                } else {
                  const gameCategory = card.querySelector('.game-category').textContent.toLowerCase();
                  if (gameCategory === category) {
                    card.style.display = '';
                  } else {
                    card.style.display = 'none';
                  }
                }
              });
            });
          });

          // Check login before playing
          const playButtons = document.querySelectorAll('.play-btn-small');
          playButtons.forEach(btn => {
            btn.addEventListener('click', function (e) {
              e.preventDefault();
              const currentUser = localStorage.getItem('currentUser');

              if (!currentUser) {
                window.location.href = 'login.html';
              } else {
                window.location.href = 'galaxyflyers.html';
              }
            });
          });
        });

        // AdMob Implementation
        document.addEventListener('DOMContentLoaded', async () => {
          if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.AdMob) {
            const AdMob = window.Capacitor.Plugins.AdMob;

            try {
              await AdMob.initialize();

              if (AdMob.requestTrackingAuthorization) {
                await AdMob.requestTrackingAuthorization();
              }

              // Hide any existing banner first (just in case)
              try { await AdMob.hideBanner(); } catch (e) { }

              await AdMob.showBanner({
                adId: 'ca-app-pub-2895577345632637/6088501127',
                adSize: 'BANNER', // Changed to BANNER which is universally supported
                position: 'BOTTOM_CENTER',
                margin: 0,
                isTesting: false
              });

              console.log("Gaming Page Ad Loaded Successfully");
            } catch (e) {
              console.error("AdMob Banner Error in games.html:", e);
            }
          } else {
            console.log("Capacitor/AdMob not found - Browser mode.");
          }
        });
      </script>
      <script src="backbutton.js"></script>
</body>

</html>
